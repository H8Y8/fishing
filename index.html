<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>貓咪釣魚樂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#050d1a;
  overscroll-behavior:none;
  touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;user-select:none;
}
body{
  display:flex;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}
canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
//  《貓咪釣魚樂》— 手機優先・虛擬搖桿版
//  Mobile-first HTML5 Canvas fishing game
//  All sprites drawn via Canvas paths (no emoji)
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ==================== 顯示與佈局 ====================
let W, H, DPR;        // 邏輯寬高、裝置像素比
let SEA_Y;             // 海平面 Y
let CTRL_H;            // 底部控制區高度
let GAME_H;            // 遊戲區高度（扣除控制區）
let S;                 // 全域縮放因子

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  recalcLayout();
}

function recalcLayout() {
  // 縮放因子：以 500px 寬為基準
  S = Math.max(0.75, Math.min(1.8, W / 500));
  // 控制區高度
  CTRL_H = Math.max(110, Math.min(160, H * 0.18));
  GAME_H = H - CTRL_H;
  // 海平面（遊戲區上方 17%）
  SEA_Y = GAME_H * 0.17;
  // 玩家位置
  player.y = SEA_Y - 16 * S;
  player.x = Math.max(30 * S, Math.min(W - 30 * S, player.x || W / 2));
  // 搖桿位置
  joy.cx = Math.max(70 * S, W * 0.15);
  joy.cy = H - CTRL_H / 2;
  joy.r  = Math.min(48 * S, CTRL_H * 0.35);
  joy.kr = joy.r * 0.42;
  // 釣魚鈕位置
  cast.cx = Math.min(W - 70 * S, W * 0.85);
  cast.cy = H - CTRL_H / 2;
  cast.r  = Math.min(42 * S, CTRL_H * 0.33);
}

window.addEventListener('resize', resize);

// ==================== 遊戲常數 ====================
const PLAYER_SPEED = 3.5;
const HOOK_GRAVITY = 4.0;
const HOOK_REEL    = 6.5;
const HUNGER_MAX   = 100;
const HUNGER_DECAY = 0.028;
const STUN_FRAMES  = 90;          // ≈ 1.5 秒
const SPAWN_MIN    = 40;
const SPAWN_MAX    = 85;

// ==================== 遊戲狀態 ====================
let score       = 0;
let hunger      = HUNGER_MAX;
let gameOver    = false;
let stunTimer   = 0;
let frameCount  = 0;
let spawnCD     = 50;
let screenFlash = 0;               // 受擊畫面閃爍
let castRequested = false;          // 觸控釣魚請求

// ==================== 玩家 ====================
const player = { x: 0, y: 0, bobY: 0 };

// ==================== 釣鉤 ====================
const hook = { x: 0, y: 0, active: false, reeling: false, caught: null };

// ==================== 鍵盤輸入 ====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  if(!gameOver) e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ==================== 虛擬搖桿 ====================
const joy = {
  cx: 0, cy: 0, r: 48, kr: 20,   // 位置、基底半徑、把手半徑
  dx: 0, dy: 0,                    // 把手偏移
  tid: null, active: false,        // 觸控追蹤
};

// ==================== 釣魚按鈕 ====================
const cast = {
  cx: 0, cy: 0, r: 38,
  tid: null, pressed: false,
};

// ==================== 重新開始按鈕（Game Over 用）====================
const restartBtn = { x: 0, y: 0, w: 0, h: 0 };

// ==================== 觸控處理 ====================
function touchPos(t) {
  const r = canvas.getBoundingClientRect();
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function dist(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); }

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = touchPos(t);
    // Game Over → 重新開始
    if (gameOver) {
      if (p.x >= restartBtn.x && p.x <= restartBtn.x + restartBtn.w &&
          p.y >= restartBtn.y && p.y <= restartBtn.y + restartBtn.h) {
        restartGame();
      }
      continue;
    }
    // 搖桿（擴大觸擊區）
    if (joy.tid === null && dist(p.x, p.y, joy.cx, joy.cy) < joy.r * 2.2) {
      joy.tid = t.identifier;
      joy.active = true;
      updateJoy(p.x, p.y);
      continue;
    }
    // 釣魚鈕（擴大觸擊區）
    if (cast.tid === null && dist(p.x, p.y, cast.cx, cast.cy) < cast.r * 2.2) {
      cast.tid = t.identifier;
      cast.pressed = true;
      castRequested = true;
      continue;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.tid) updateJoy(touchPos(t).x, touchPos(t).y);
  }
}, { passive: false });

function onTouchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joy.tid)  { joy.tid = null; joy.active = false; joy.dx = joy.dy = 0; }
    if (t.identifier === cast.tid) { cast.tid = null; cast.pressed = false; }
  }
}
canvas.addEventListener('touchend',    onTouchEnd);
canvas.addEventListener('touchcancel', onTouchEnd);

function updateJoy(tx, ty) {
  let dx = tx - joy.cx, dy = ty - joy.cy;
  const d = Math.hypot(dx, dy);
  if (d > joy.r) { dx = dx / d * joy.r; dy = dy / d * joy.r; }
  joy.dx = dx; joy.dy = dy;
}

// 滑鼠 fallback（桌面測試）
canvas.addEventListener('click', e => {
  if (!gameOver) return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (mx >= restartBtn.x && mx <= restartBtn.x + restartBtn.w &&
      my >= restartBtn.y && my <= restartBtn.y + restartBtn.h) restartGame();
});
// 鍵盤重新開始
window.addEventListener('keydown', e => {
  if (gameOver && (e.code === 'Enter' || e.code === 'Space')) restartGame();
});

// ==================== 海底物件定義 ====================
const ITEM_DEFS = [
  { sprite:'fish',     emoji:'🐟', type:'fish',     pts: 100, food: 8,  spd:[1,2.5],  sz:32, wt:5 },
  { sprite:'tropical', emoji:'🐠', type:'fish',     pts: 120, food: 10, spd:[1,2],    sz:32, wt:4 },
  { sprite:'squid',    emoji:'🦑', type:'special',  pts: 300, food: 15, spd:[2,3.5],  sz:34, wt:2, wave:true },
  { sprite:'octopus',  emoji:'🐙', type:'special',  pts: 350, food: 18, spd:[1.8,3],  sz:36, wt:1, wave:true },
  { sprite:'puffer',   emoji:'🐡', type:'obstacle', pts:-150, food:-20, spd:[0.8,1.8],sz:30, wt:2 },
  { sprite:'boot',     emoji:'🥾', type:'obstacle', pts:-100, food:-15, spd:[0.5,1.2],sz:32, wt:2 },
  { sprite:'can',      emoji:'🥫', type:'obstacle', pts: -80, food:-10, spd:[0.6,1.5],sz:28, wt:2 },
];

function pickItemDef() {
  const total = ITEM_DEFS.reduce((s, d) => s + d.wt, 0);
  let r = Math.random() * total;
  for (const d of ITEM_DEFS) { r -= d.wt; if (r <= 0) return d; }
  return ITEM_DEFS[0];
}

// ==================== Canvas 精靈繪製（取代 emoji）====================
const SPRITES = {};

// --- 金魚 ---
SPRITES.fish = function(c, x, y, s) {
  const r = s * 0.42;
  // 尾鰭
  c.fillStyle = '#FF8F00';
  c.beginPath(); c.moveTo(x - r * 0.7, y);
  c.lineTo(x - r * 1.35, y - r * 0.55); c.lineTo(x - r * 1.35, y + r * 0.55);
  c.closePath(); c.fill();
  // 身體
  c.fillStyle = '#FFB300';
  c.beginPath(); c.ellipse(x, y, r, r * 0.6, 0, 0, Math.PI * 2); c.fill();
  // 背鰭
  c.fillStyle = '#FF8F00';
  c.beginPath(); c.moveTo(x - r * 0.1, y - r * 0.55);
  c.quadraticCurveTo(x + r * 0.1, y - r * 0.95, x + r * 0.4, y - r * 0.55);
  c.closePath(); c.fill();
  // 眼睛
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x + r * 0.35, y - r * 0.1, r * 0.18, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x + r * 0.4, y - r * 0.1, r * 0.1, 0, Math.PI * 2); c.fill();
  // 腹鰭
  c.fillStyle = '#FFA000';
  c.beginPath(); c.moveTo(x, y + r * 0.4);
  c.quadraticCurveTo(x + r * 0.15, y + r * 0.75, x + r * 0.3, y + r * 0.5);
  c.closePath(); c.fill();
};

// --- 熱帶魚 ---
SPRITES.tropical = function(c, x, y, s) {
  const r = s * 0.42;
  // 尾鰭
  c.fillStyle = '#FF7043';
  c.beginPath(); c.moveTo(x - r * 0.7, y);
  c.lineTo(x - r * 1.35, y - r * 0.5); c.lineTo(x - r * 1.35, y + r * 0.5);
  c.closePath(); c.fill();
  // 身體
  c.fillStyle = '#00BCD4';
  c.beginPath(); c.ellipse(x, y, r, r * 0.7, 0, 0, Math.PI * 2); c.fill();
  // 條紋（用 clip）
  c.save();
  c.beginPath(); c.ellipse(x, y, r, r * 0.7, 0, 0, Math.PI * 2); c.clip();
  c.fillStyle = '#FF7043';
  c.fillRect(x - r * 0.15, y - r * 0.8, r * 0.22, r * 1.6);
  c.fillRect(x + r * 0.28, y - r * 0.8, r * 0.16, r * 1.6);
  c.restore();
  // 背鰭
  c.fillStyle = '#0097A7';
  c.beginPath(); c.moveTo(x - r * 0.15, y - r * 0.65);
  c.quadraticCurveTo(x, y - r * 1.05, x + r * 0.3, y - r * 0.65);
  c.closePath(); c.fill();
  // 眼睛
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x + r * 0.35, y - r * 0.08, r * 0.17, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x + r * 0.4, y - r * 0.08, r * 0.09, 0, Math.PI * 2); c.fill();
};

// --- 烏賊 ---
SPRITES.squid = function(c, x, y, s) {
  const r = s * 0.42;
  // 觸手
  c.strokeStyle = '#BF360C'; c.lineWidth = r * 0.1; c.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const tx = x + (i - 2.5) * r * 0.2;
    c.beginPath(); c.moveTo(tx, y + r * 0.35);
    c.quadraticCurveTo(tx + Math.sin(i * 1.2) * r * 0.15, y + r * 0.85,
                       tx + Math.sin(i * 0.8 + 1) * r * 0.1, y + r * 1.15);
    c.stroke();
  }
  // 身體
  c.fillStyle = '#E65100';
  c.beginPath();
  c.moveTo(x - r * 0.45, y + r * 0.35);
  c.quadraticCurveTo(x - r * 0.55, y - r * 0.3, x - r * 0.3, y - r * 0.7);
  c.quadraticCurveTo(x, y - r * 1, x + r * 0.3, y - r * 0.7);
  c.quadraticCurveTo(x + r * 0.55, y - r * 0.3, x + r * 0.45, y + r * 0.35);
  c.closePath(); c.fill();
  // 頭頂漸層亮部
  c.fillStyle = '#FF8A65';
  c.beginPath(); c.ellipse(x, y - r * 0.35, r * 0.25, r * 0.2, 0, 0, Math.PI * 2); c.fill();
  // 眼睛
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x - r * 0.18, y - r * 0.05, r * 0.15, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + r * 0.18, y - r * 0.05, r * 0.15, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x - r * 0.15, y - r * 0.03, r * 0.08, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + r * 0.21, y - r * 0.03, r * 0.08, 0, Math.PI * 2); c.fill();
};

// --- 章魚 ---
SPRITES.octopus = function(c, x, y, s) {
  const r = s * 0.42;
  // 觸手
  c.strokeStyle = '#AD1457'; c.lineWidth = r * 0.12; c.lineCap = 'round';
  for (let i = 0; i < 7; i++) {
    const a = (i / 6) * Math.PI;
    const bx = x + Math.cos(a) * r * 0.4 - r * 0.2;
    const by = y + r * 0.25;
    c.beginPath(); c.moveTo(bx, by);
    c.quadraticCurveTo(
      bx + Math.cos(a) * r * 0.45, by + r * 0.45,
      bx + Math.cos(a + 0.4) * r * 0.5, by + r * 0.8
    ); c.stroke();
  }
  // 頭
  c.fillStyle = '#E91E8E';
  c.beginPath(); c.arc(x, y - r * 0.1, r * 0.55, 0, Math.PI * 2); c.fill();
  // 亮部
  c.fillStyle = '#F48FB1';
  c.beginPath(); c.ellipse(x - r * 0.1, y - r * 0.25, r * 0.2, r * 0.15, -0.3, 0, Math.PI * 2); c.fill();
  // 眼睛
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x - r * 0.22, y - r * 0.15, r * 0.16, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + r * 0.22, y - r * 0.15, r * 0.16, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x - r * 0.18, y - r * 0.13, r * 0.08, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + r * 0.26, y - r * 0.13, r * 0.08, 0, Math.PI * 2); c.fill();
  // 嘴巴
  c.strokeStyle = '#880E4F'; c.lineWidth = r * 0.05;
  c.beginPath(); c.arc(x, y + r * 0.12, r * 0.1, 0.1, Math.PI - 0.1); c.stroke();
};

// --- 河豚 ---
SPRITES.puffer = function(c, x, y, s) {
  const r = s * 0.42;
  // 刺
  c.fillStyle = '#F9A825';
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const bx = x + Math.cos(a) * r * 0.6;
    const by = y + Math.sin(a) * r * 0.6;
    c.beginPath();
    c.moveTo(bx, by);
    c.lineTo(bx + Math.cos(a) * r * 0.28, by + Math.sin(a) * r * 0.28);
    c.lineTo(bx + Math.cos(a + 0.25) * r * 0.08, by + Math.sin(a + 0.25) * r * 0.08);
    c.closePath(); c.fill();
  }
  // 身體（圓）
  c.fillStyle = '#FDD835';
  c.beginPath(); c.arc(x, y, r * 0.6, 0, Math.PI * 2); c.fill();
  // 腹部
  c.fillStyle = '#FFF9C4';
  c.beginPath(); c.ellipse(x, y + r * 0.1, r * 0.35, r * 0.25, 0, 0, Math.PI * 2); c.fill();
  // 尾鰭
  c.fillStyle = '#F9A825';
  c.beginPath(); c.moveTo(x - r * 0.55, y);
  c.lineTo(x - r * 1, y - r * 0.3); c.lineTo(x - r * 1, y + r * 0.3);
  c.closePath(); c.fill();
  // 眼睛（怒）
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x + r * 0.15, y - r * 0.15, r * 0.16, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x + r * 0.18, y - r * 0.13, r * 0.09, 0, Math.PI * 2); c.fill();
  // 怒眉
  c.strokeStyle = '#5D4037'; c.lineWidth = r * 0.07; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x + r * 0.0, y - r * 0.3); c.lineTo(x + r * 0.28, y - r * 0.32); c.stroke();
  // 嘴
  c.strokeStyle = '#795548'; c.lineWidth = r * 0.06;
  c.beginPath(); c.arc(x + r * 0.15, y + r * 0.18, r * 0.1, 0.2, Math.PI - 0.2); c.stroke();
};

// --- 靴子 ---
SPRITES.boot = function(c, x, y, s) {
  const r = s * 0.42;
  // 靴身
  c.fillStyle = '#6D4C41';
  c.beginPath();
  c.moveTo(x - r * 0.3, y - r * 0.85);
  c.lineTo(x + r * 0.25, y - r * 0.85);
  c.lineTo(x + r * 0.25, y + r * 0.15);
  c.lineTo(x + r * 0.75, y + r * 0.15);
  c.quadraticCurveTo(x + r * 0.85, y + r * 0.55, x + r * 0.7, y + r * 0.6);
  c.lineTo(x - r * 0.35, y + r * 0.6);
  c.quadraticCurveTo(x - r * 0.4, y + r * 0.15, x - r * 0.3, y - r * 0.85);
  c.closePath(); c.fill();
  // 鞋底
  c.fillStyle = '#3E2723';
  c.beginPath();
  c.moveTo(x - r * 0.4, y + r * 0.55);
  c.lineTo(x + r * 0.78, y + r * 0.55);
  c.quadraticCurveTo(x + r * 0.88, y + r * 0.7, x + r * 0.72, y + r * 0.75);
  c.lineTo(x - r * 0.38, y + r * 0.75);
  c.quadraticCurveTo(x - r * 0.5, y + r * 0.7, x - r * 0.4, y + r * 0.55);
  c.closePath(); c.fill();
  // 鞋口
  c.fillStyle = '#8D6E63';
  c.beginPath(); c.ellipse(x - r * 0.025, y - r * 0.85, r * 0.3, r * 0.08, 0, 0, Math.PI * 2); c.fill();
  // 鞋帶裝飾
  c.strokeStyle = '#5D4037'; c.lineWidth = r * 0.04;
  c.beginPath(); c.moveTo(x - r * 0.15, y - r * 0.3); c.lineTo(x + r * 0.1, y - r * 0.3); c.stroke();
  c.beginPath(); c.moveTo(x - r * 0.15, y - r * 0.5); c.lineTo(x + r * 0.1, y - r * 0.5); c.stroke();
};

// --- 罐頭 ---
SPRITES.can = function(c, x, y, s) {
  const r = s * 0.4;
  // 罐體
  c.fillStyle = '#E53935';
  rr(c, x - r * 0.4, y - r * 0.6, r * 0.8, r * 1.2, r * 0.08); c.fill();
  // 標籤
  c.fillStyle = '#FFCDD2';
  c.fillRect(x - r * 0.35, y - r * 0.15, r * 0.7, r * 0.35);
  // 標籤文字線條
  c.strokeStyle = '#C62828'; c.lineWidth = r * 0.04;
  c.beginPath(); c.moveTo(x - r * 0.25, y); c.lineTo(x + r * 0.25, y); c.stroke();
  c.beginPath(); c.moveTo(x - r * 0.2, y + r * 0.1); c.lineTo(x + r * 0.2, y + r * 0.1); c.stroke();
  // 頂部
  c.fillStyle = '#BDBDBD';
  c.beginPath(); c.ellipse(x, y - r * 0.55, r * 0.38, r * 0.1, 0, 0, Math.PI * 2); c.fill();
  // 拉環
  c.strokeStyle = '#757575'; c.lineWidth = r * 0.06;
  c.beginPath(); c.ellipse(x + r * 0.05, y - r * 0.62, r * 0.12, r * 0.06, 0, 0, Math.PI * 2); c.stroke();
  // 底部
  c.fillStyle = '#BDBDBD';
  c.beginPath(); c.ellipse(x, y + r * 0.55, r * 0.38, r * 0.08, 0, 0, Math.PI * 2); c.fill();
};

// --- 貓咪 ---
SPRITES.cat = function(c, x, y, s) {
  const r = s * 0.42;
  // 臉
  c.fillStyle = '#FF9800';
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill();
  // 耳朵
  c.fillStyle = '#FF9800';
  c.beginPath();
  c.moveTo(x - r * 0.72, y - r * 0.45);
  c.lineTo(x - r * 0.38, y - r * 1.15);
  c.lineTo(x - r * 0.05, y - r * 0.5);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(x + r * 0.05, y - r * 0.5);
  c.lineTo(x + r * 0.38, y - r * 1.15);
  c.lineTo(x + r * 0.72, y - r * 0.45);
  c.closePath(); c.fill();
  // 內耳
  c.fillStyle = '#FFB74D';
  c.beginPath();
  c.moveTo(x - r * 0.58, y - r * 0.5);
  c.lineTo(x - r * 0.38, y - r * 0.95);
  c.lineTo(x - r * 0.15, y - r * 0.52);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(x + r * 0.15, y - r * 0.52);
  c.lineTo(x + r * 0.38, y - r * 0.95);
  c.lineTo(x + r * 0.58, y - r * 0.5);
  c.closePath(); c.fill();
  // 眼睛
  c.fillStyle = '#222';
  c.beginPath(); c.ellipse(x - r * 0.3, y - r * 0.08, r * 0.1, r * 0.15, 0, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.ellipse(x + r * 0.3, y - r * 0.08, r * 0.1, r * 0.15, 0, 0, Math.PI * 2); c.fill();
  // 眼睛亮點
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(x - r * 0.26, y - r * 0.14, r * 0.045, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + r * 0.34, y - r * 0.14, r * 0.045, 0, Math.PI * 2); c.fill();
  // 鼻子
  c.fillStyle = '#E65100';
  c.beginPath();
  c.moveTo(x, y + r * 0.08); c.lineTo(x - r * 0.09, y + r * 0.18); c.lineTo(x + r * 0.09, y + r * 0.18);
  c.closePath(); c.fill();
  // 嘴巴
  c.strokeStyle = '#BF360C'; c.lineWidth = r * 0.05; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x, y + r * 0.18); c.lineTo(x - r * 0.15, y + r * 0.32); c.stroke();
  c.beginPath(); c.moveTo(x, y + r * 0.18); c.lineTo(x + r * 0.15, y + r * 0.32); c.stroke();
  // 鬍鬚
  c.strokeStyle = '#5D4037'; c.lineWidth = r * 0.03;
  c.beginPath(); c.moveTo(x - r * 0.3, y + r * 0.12); c.lineTo(x - r * 0.88, y + r * 0.02); c.stroke();
  c.beginPath(); c.moveTo(x - r * 0.3, y + r * 0.22); c.lineTo(x - r * 0.88, y + r * 0.22); c.stroke();
  c.beginPath(); c.moveTo(x + r * 0.3, y + r * 0.12); c.lineTo(x + r * 0.88, y + r * 0.02); c.stroke();
  c.beginPath(); c.moveTo(x + r * 0.3, y + r * 0.22); c.lineTo(x + r * 0.88, y + r * 0.22); c.stroke();
};

// --- 鍋子 ---
SPRITES.pot = function(c, x, y, s) {
  const r = s * 0.48;
  // 鍋身
  c.fillStyle = '#5D4037';
  c.beginPath();
  c.moveTo(x - r * 0.78, y - r * 0.2);
  c.quadraticCurveTo(x - r * 0.85, y + r * 0.55, x - r * 0.5, y + r * 0.65);
  c.lineTo(x + r * 0.5, y + r * 0.65);
  c.quadraticCurveTo(x + r * 0.85, y + r * 0.55, x + r * 0.78, y - r * 0.2);
  c.closePath(); c.fill();
  // 鍋緣
  c.fillStyle = '#795548';
  c.beginPath(); c.ellipse(x, y - r * 0.2, r * 0.82, r * 0.13, 0, 0, Math.PI * 2); c.fill();
  // 鍋內（湯）
  c.fillStyle = '#FF8A65';
  c.beginPath(); c.ellipse(x, y - r * 0.15, r * 0.62, r * 0.1, 0, 0, Math.PI * 2); c.fill();
  // 蒸氣
  c.strokeStyle = 'rgba(255,255,255,0.3)'; c.lineWidth = r * 0.06; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x - r * 0.2, y - r * 0.35);
  c.quadraticCurveTo(x - r * 0.32, y - r * 0.6, x - r * 0.15, y - r * 0.78); c.stroke();
  c.beginPath(); c.moveTo(x + r * 0.15, y - r * 0.4);
  c.quadraticCurveTo(x + r * 0.28, y - r * 0.65, x + r * 0.1, y - r * 0.82); c.stroke();
};

// --- 星星（暈眩用）---
SPRITES.star = function(c, x, y, s) {
  const r = s * 0.4;
  c.fillStyle = '#FFD600';
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 72 - 90) * Math.PI / 180;
    const a2 = ((i * 72 + 36) - 90) * Math.PI / 180;
    if (i === 0) c.moveTo(x + Math.cos(a1) * r, y + Math.sin(a1) * r);
    else c.lineTo(x + Math.cos(a1) * r, y + Math.sin(a1) * r);
    c.lineTo(x + Math.cos(a2) * r * 0.42, y + Math.sin(a2) * r * 0.42);
  }
  c.closePath(); c.fill();
  // 亮點
  c.fillStyle = '#FFF9C4';
  c.beginPath(); c.arc(x, y, r * 0.15, 0, Math.PI * 2); c.fill();
};

// --- 閃爍星（暈眩用）---
SPRITES.sparkle = function(c, x, y, s) {
  const r = s * 0.35;
  c.fillStyle = '#FFF176';
  c.beginPath();
  // 四角星
  c.moveTo(x, y - r);
  c.quadraticCurveTo(x + r * 0.12, y - r * 0.12, x + r, y);
  c.quadraticCurveTo(x + r * 0.12, y + r * 0.12, x, y + r);
  c.quadraticCurveTo(x - r * 0.12, y + r * 0.12, x - r, y);
  c.quadraticCurveTo(x - r * 0.12, y - r * 0.12, x, y - r);
  c.closePath(); c.fill();
};

// --- 悲傷貓咪 ---
SPRITES.sadcat = function(c, x, y, s) {
  SPRITES.cat(c, x, y, s);
  const r = s * 0.42;
  // 淚滴
  c.fillStyle = 'rgba(66,165,245,0.8)';
  c.beginPath();
  c.moveTo(x - r * 0.22, y + r * 0.1);
  c.quadraticCurveTo(x - r * 0.35, y + r * 0.55, x - r * 0.22, y + r * 0.65);
  c.quadraticCurveTo(x - r * 0.09, y + r * 0.55, x - r * 0.22, y + r * 0.1);
  c.fill();
  c.beginPath();
  c.moveTo(x + r * 0.22, y + r * 0.15);
  c.quadraticCurveTo(x + r * 0.1, y + r * 0.5, x + r * 0.22, y + r * 0.58);
  c.quadraticCurveTo(x + r * 0.34, y + r * 0.5, x + r * 0.22, y + r * 0.15);
  c.fill();
  // 悲傷眉毛
  c.strokeStyle = '#5D4037'; c.lineWidth = r * 0.06; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x - r * 0.45, y - r * 0.3); c.lineTo(x - r * 0.15, y - r * 0.22); c.stroke();
  c.beginPath(); c.moveTo(x + r * 0.45, y - r * 0.3); c.lineTo(x + r * 0.15, y - r * 0.22); c.stroke();
};

// --- 釣竿圖示（HUD 分數用）---
SPRITES.hookicon = function(c, x, y, s) {
  const r = s * 0.4;
  // 竿
  c.strokeStyle = '#8D6E63'; c.lineWidth = r * 0.13; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x - r * 0.6, y - r * 0.65); c.lineTo(x + r * 0.45, y + r * 0.08); c.stroke();
  // 線
  c.strokeStyle = '#B0BEC5'; c.lineWidth = r * 0.05;
  c.beginPath(); c.moveTo(x + r * 0.45, y + r * 0.08); c.lineTo(x + r * 0.45, y + r * 0.6); c.stroke();
  // 鉤
  c.strokeStyle = '#CFD8DC'; c.lineWidth = r * 0.08; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x + r * 0.45, y + r * 0.45);
  c.arc(x + r * 0.58, y + r * 0.45, r * 0.14, Math.PI, -0.3, true); c.stroke();
};

// --- 重新整理圖示 ---
SPRITES.refresh = function(c, x, y, s) {
  const r = s * 0.32;
  c.strokeStyle = '#fff'; c.lineWidth = r * 0.18; c.lineCap = 'round';
  // 圓弧
  c.beginPath(); c.arc(x, y, r, -Math.PI * 0.7, Math.PI * 0.5); c.stroke();
  // 箭頭
  const ax = x + Math.cos(Math.PI * 0.5) * r;
  const ay = y + Math.sin(Math.PI * 0.5) * r;
  c.fillStyle = '#fff';
  c.beginPath();
  c.moveTo(ax - r * 0.35, ay - r * 0.15);
  c.lineTo(ax + r * 0.05, ay + r * 0.25);
  c.lineTo(ax + r * 0.15, ay - r * 0.3);
  c.closePath(); c.fill();
};

function drawSprite(name, c, x, y, s) {
  const fn = SPRITES[name];
  if (fn) fn(c, x, y, s);
}

// ==================== 動態物件陣列 ====================
let items    = [];   // 海底物件
let particles = [];  // 粒子特效
let floats    = [];  // 浮動文字（+100 等）
let bubbles   = [];  // 背景氣泡

// ==================== 生成海底物件 ====================
function spawnItem() {
  const d = pickItemDef();
  const left = Math.random() < 0.5;
  const spd = (d.spd[0] + Math.random() * (d.spd[1] - d.spd[0])) * S;
  const minY = SEA_Y + 35 * S;
  const maxY = GAME_H - 30 * S;
  const y = minY + Math.random() * (maxY - minY);
  const sz = d.sz * S;
  items.push({
    sprite: d.sprite, emoji: d.emoji, type: d.type, pts: d.pts, food: d.food,
    wave: d.wave || false,
    x: left ? -sz : W + sz,
    y, baseY: y,
    speed: left ? spd : -spd,
    sz, phase: Math.random() * Math.PI * 2,
  });
}

// ==================== 粒子 ====================
function emitParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4 * S,
      vy: (Math.random() - 1) * 3 * S,
      life: 35 + Math.random() * 20,
      max: 55, r: (2 + Math.random() * 3) * S, color,
    });
  }
}

// ==================== 浮動文字 ====================
function addFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life: 55, max: 55 });
}

// ==================== 氣泡 ====================
function spawnBubble() {
  bubbles.push({
    x: Math.random() * W, y: GAME_H + 5,
    r: (1.5 + Math.random() * 3) * S,
    spd: (0.3 + Math.random() * 0.6) * S,
    alpha: 0.12 + Math.random() * 0.2,
    drift: (Math.random() - 0.5) * 0.3 * S,
  });
}

// ==================== 碰撞偵測 ====================
function overlap(ax, ay, as, bx, by, bs) {
  const hr = (as + bs) * 0.45;
  return Math.abs(ax - bx) < hr && Math.abs(ay - by) < hr;
}

// ==================== 更新邏輯 ====================
function update() {
  if (gameOver) return;
  frameCount++;

  // 飢餓度下降
  hunger -= HUNGER_DECAY;
  if (hunger <= 0) { hunger = 0; gameOver = true; return; }

  // 暈眩倒數
  if (stunTimer > 0) stunTimer--;

  // === 玩家移動 ===
  if (stunTimer <= 0) {
    // 搖桿輸入
    if (joy.active) {
      const nx = joy.dx / joy.r;
      if (Math.abs(nx) > 0.08) player.x += nx * PLAYER_SPEED * S;
    }
    // 鍵盤輸入
    if (keys['ArrowLeft']  || keys['KeyA']) player.x -= PLAYER_SPEED * S;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += PLAYER_SPEED * S;
  }
  player.x = Math.max(35 * S, Math.min(W - 35 * S, player.x));
  player.bobY = Math.sin(frameCount * 0.04) * 3 * S;

  // === 釣鉤：發射 / 提早收鉤 ===
  const wantCast = castRequested || keys['Space'] || keys['ArrowDown'];
  castRequested = false;
  if (wantCast && stunTimer <= 0) {
    if (!hook.active && !hook.reeling) {
      // 發射
      hook.active = true; hook.reeling = false;
      hook.x = player.x; hook.y = player.y + 20 * S;
      hook.caught = null;
    } else if (hook.active && !hook.reeling) {
      // 提早收鉤
      hook.reeling = true;
    }
  }

  // === 釣鉤：下沉 ===
  if (hook.active && !hook.reeling) {
    hook.y += HOOK_GRAVITY * S;
    // 碰撞偵測
    const hs = 14 * S;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (overlap(hook.x, hook.y, hs, it.x, it.y, it.sz)) {
        hook.caught = it; hook.reeling = true;
        items.splice(i, 1); break;
      }
    }
    if (hook.y >= GAME_H - 8) hook.reeling = true;
  }

  // === 釣鉤：收回 ===
  if (hook.reeling) {
    hook.y -= HOOK_REEL * S;
    // 上行途中也能勾到東西
    if (!hook.caught) {
      const hs = 14 * S;
      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        if (overlap(hook.x, hook.y, hs, it.x, it.y, it.sz)) {
          hook.caught = it; items.splice(i, 1); break;
        }
      }
    }
    if (hook.caught) { hook.caught.x = hook.x; hook.caught.y = hook.y + 14 * S; }
    if (hook.y <= player.y + 8 * S) {
      if (hook.caught) {
        const it = hook.caught;
        score = Math.max(0, score + it.pts);
        if (it.type === 'obstacle') {
          stunTimer = STUN_FRAMES;
          screenFlash = 10;
          hunger = Math.max(0, hunger + it.food);
          emitParticles(player.x, player.y, '#ff4444', 14);
          addFloat(player.x, player.y - 30 * S, `${it.pts}`, '#ff6666');
          if (navigator.vibrate) navigator.vibrate([40, 20, 80]); // 觸覺回饋：障礙物
        } else {
          hunger = Math.min(HUNGER_MAX, hunger + it.food);
          const c = it.type === 'special' ? '#ffdd44' : '#44ffaa';
          emitParticles(player.x, player.y, c, 12);
          addFloat(player.x, player.y - 30 * S, `+${it.pts}`, c);
          if (navigator.vibrate) navigator.vibrate(30); // 觸覺回饋：釣到魚
        }
        hook.caught = null;
      }
      hook.active = false; hook.reeling = false;
    }
  }

  // === 海底物件移動 ===
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.x += it.speed;
    if (it.wave) { it.phase += 0.04; it.y = it.baseY + Math.sin(it.phase) * 22 * S; }
    if ((it.speed > 0 && it.x > W + 60) || (it.speed < 0 && it.x < -60)) items.splice(i, 1);
  }

  // === 生成物件 ===
  if (--spawnCD <= 0) {
    spawnItem();
    spawnCD = SPAWN_MIN + Math.floor(Math.random() * (SPAWN_MAX - SPAWN_MIN));
    if (frameCount > 500) spawnCD = Math.max(18, spawnCD - 12);
  }

  // === 粒子 ===
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05 * S;
    if (--p.life <= 0) particles.splice(i, 1);
  }
  // === 浮動文字 ===
  for (let i = floats.length - 1; i >= 0; i--) {
    floats[i].y -= 0.8 * S;
    if (--floats[i].life <= 0) floats.splice(i, 1);
  }
  // === 氣泡 ===
  if (frameCount % 10 === 0) spawnBubble();
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y -= b.spd; b.x += b.drift;
    if (b.y < SEA_Y - 10) bubbles.splice(i, 1);
  }
  // 畫面閃爍衰減
  if (screenFlash > 0) screenFlash--;
}

// ==================== 繪製 ====================
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawSea();
  drawLightRays();
  drawBubbles();
  drawSeaweed();
  drawItems();
  drawHookLine();
  drawWaves();
  drawPlayer();
  drawParticles();
  drawFloats();
  drawHUD();
  drawScreenFlash();
  drawControlZone();
  if (gameOver) drawGameOver();
}

// ---------- 天空 ----------
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, SEA_Y);
  g.addColorStop(0, '#0a0e27'); g.addColorStop(1, '#1a2550');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, SEA_Y);
  // 星星
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  const seeds = [22,78,155,230,310,400,475,555,640,710,760];
  for (const sx of seeds) {
    const px = sx / 800 * W;
    const py = (8 + (sx * 7) % 60) / 800 * W;
    if (py > SEA_Y - 4) continue;
    const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(frameCount * 0.02 + sx));
    ctx.globalAlpha = twinkle * 0.6;
    ctx.beginPath(); ctx.arc(px, py, (1 + (sx % 3) * 0.5) * S, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // 月亮
  const mx = W * 0.82, my = SEA_Y * 0.35, mr = 16 * S;
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a0e27';
  ctx.beginPath(); ctx.arc(mx + mr * 0.45, my - mr * 0.25, mr * 0.8, 0, Math.PI * 2); ctx.fill();
}

// ---------- 海水 ----------
function drawSea() {
  const g = ctx.createLinearGradient(0, SEA_Y, 0, GAME_H);
  g.addColorStop(0,   '#1565C0');
  g.addColorStop(0.25,'#0D47A1');
  g.addColorStop(0.6, '#0a2e6e');
  g.addColorStop(1,   '#04122e');
  ctx.fillStyle = g; ctx.fillRect(0, SEA_Y, W, GAME_H - SEA_Y);
}

// ---------- 海底光線 ----------
function drawLightRays() {
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const bx = W * (0.08 + i * 0.22);
    const sway = Math.sin(frameCount * 0.007 + i * 1.3) * 18 * S;
    const tw = 4 * S, bw = (25 + i * 8) * S;
    const depth = (GAME_H - SEA_Y) * 0.55;
    const g = ctx.createLinearGradient(bx, SEA_Y, bx, SEA_Y + depth);
    g.addColorStop(0, 'rgba(80,160,255,0.035)');
    g.addColorStop(1, 'rgba(80,160,255,0)');
    ctx.beginPath();
    ctx.moveTo(bx - tw + sway, SEA_Y);
    ctx.lineTo(bx + tw + sway, SEA_Y);
    ctx.lineTo(bx + sway * 0.4 + bw, SEA_Y + depth);
    ctx.lineTo(bx + sway * 0.4 - bw, SEA_Y + depth);
    ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
  }
  ctx.restore();
}

// ---------- 氣泡 ----------
function drawBubbles() {
  for (const b of bubbles) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140,200,255,${b.alpha})`;
    ctx.lineWidth = 0.8 * S; ctx.stroke();
  }
}

// ---------- 海草 ----------
function drawSeaweed() {
  const gY = GAME_H - 3;
  ctx.lineCap = 'round';
  for (let x = 25; x < W; x += 55 + (x * 3 % 30)) {
    const h = (18 + (x * 7 % 25)) * S;
    const sw = Math.sin(frameCount * 0.015 + x * 0.08) * 6 * S;
    ctx.beginPath(); ctx.moveTo(x, gY);
    ctx.quadraticCurveTo(x + sw, gY - h * 0.55, x + sw * 1.3, gY - h);
    ctx.strokeStyle = `rgba(30,110,55,${0.12 + (x * 11 % 8) * 0.01})`;
    ctx.lineWidth = (1.5 + (x % 3)) * S; ctx.stroke();
  }
}

// ---------- 海底物件（Canvas 精靈）----------
function drawItems() {
  for (const it of items) {
    ctx.save();
    ctx.translate(it.x, it.y);
    if (it.speed < 0) ctx.scale(-1, 1);
    drawSprite(it.sprite, ctx, 0, 0, it.sz);
    ctx.restore();
  }
}

// ---------- 釣線 & 釣鉤 ----------
function drawHookLine() {
  if (!hook.active) return;
  const py = player.y + player.bobY;
  // 釣線
  ctx.beginPath();
  ctx.moveTo(player.x, py + 14 * S);
  ctx.lineTo(hook.x, hook.y);
  ctx.strokeStyle = 'rgba(210,210,220,0.7)';
  ctx.lineWidth = 1.2 * S; ctx.stroke();
  // 釣鉤（Canvas 繪製）
  const hs = 8 * S;
  ctx.save(); ctx.translate(hook.x, hook.y);
  ctx.strokeStyle = '#ccd'; ctx.lineWidth = 2 * S; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -hs); ctx.lineTo(0, hs * 0.3);
  ctx.arc(hs * 0.35, hs * 0.3, hs * 0.35, Math.PI, -0.2, true);
  ctx.stroke();
  ctx.restore();
  // 被鉤住的物件（Canvas 精靈）
  if (hook.caught) {
    ctx.save();
    ctx.translate(hook.caught.x, hook.caught.y);
    drawSprite(hook.caught.sprite, ctx, 0, 0, hook.caught.sz);
    ctx.restore();
  }
}

// ---------- 海浪（半透明，疊在物件上方） ----------
function drawWaves() {
  for (let w = 0; w < 3; w++) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 3) {
      const y = SEA_Y + w * 2 * S + Math.sin((x / S + frameCount * 1.2 + w * 50) * 0.022) * 3.5 * S;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(100,180,255,${0.25 - w * 0.06})`;
    ctx.lineWidth = (1.8 - w * 0.3) * S; ctx.stroke();
  }
}

// ---------- 玩家（貓咪 + 鍋子）— Canvas 精靈 ----------
function drawPlayer() {
  const py = player.y + player.bobY;
  // 暈眩閃爍
  if (stunTimer > 0 && Math.floor(frameCount / 4) % 2 === 0) ctx.globalAlpha = 0.35;
  // 鍋子
  drawSprite('pot', ctx, player.x, py + 10 * S, 36 * S);
  // 貓咪
  drawSprite('cat', ctx, player.x, py - 14 * S, 28 * S);
  ctx.globalAlpha = 1;
  // 暈眩星星
  if (stunTimer > 0) {
    const a = frameCount * 0.12;
    drawSprite('sparkle', ctx,
      player.x + Math.cos(a) * 18 * S, py - 30 * S + Math.sin(a) * 6 * S, 14 * S);
    drawSprite('star', ctx,
      player.x + Math.cos(a + 2.2) * 20 * S, py - 28 * S + Math.sin(a + 2.2) * 6 * S, 14 * S);
  }
}

// ---------- 粒子 ----------
function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.max;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- 浮動文字 ----------
function drawFloats() {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const f of floats) {
    const a = f.life / f.max;
    ctx.globalAlpha = a;
    ctx.font = `bold ${16 * S}px system-ui,sans-serif`;
    ctx.fillStyle = f.color;
    // 陰影增加可讀性
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4 * S;
    ctx.fillText(f.text, f.x, f.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

// ---------- HUD ----------
function drawHUD() {
  const pad = 10 * S;
  // --- 分數 ---
  ctx.fillStyle = 'rgba(5,10,30,0.55)';
  rr(ctx, pad, pad, 130 * S, 30 * S, 8 * S); ctx.fill();
  // 釣竿圖示
  drawSprite('hookicon', ctx, pad + 18 * S, pad + 15 * S, 22 * S);
  // 分數文字
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${15 * S}px system-ui,sans-serif`;
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`${score}`, pad + 32 * S, pad + 15 * S);

  // --- 飢餓度條 ---
  const bw = Math.min(200 * S, W * 0.4), bh = 14 * S;
  const bx = (W - bw) / 2, by = pad + 3 * S;
  // 外框
  ctx.fillStyle = 'rgba(5,10,30,0.55)';
  rr(ctx, bx - 4 * S, by - 4 * S, bw + 8 * S, bh + 8 * S, 6 * S); ctx.fill();
  // 背景
  ctx.fillStyle = '#1a1a2e';
  rr(ctx, bx, by, bw, bh, 4 * S); ctx.fill();
  // 填充
  const ratio = hunger / HUNGER_MAX;
  const bc = ratio > 0.5 ? '#4CAF50' : ratio > 0.25 ? '#FF9800' : '#F44336';
  if (ratio > 0) { rr(ctx, bx, by, bw * ratio, bh, 4 * S); ctx.fillStyle = bc; ctx.fill(); }
  // 標籤
  ctx.textAlign = 'center';
  ctx.font = `bold ${10 * S}px system-ui,sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText(`${Math.ceil(hunger)}%`, bx + bw / 2, by + bh / 2);

  // 暈眩提示
  if (stunTimer > 0) {
    drawSprite('sparkle', ctx, W / 2 - 50 * S, pad + 38 * S, 12 * S);
    ctx.textAlign = 'center';
    ctx.font = `bold ${14 * S}px system-ui,sans-serif`;
    ctx.fillStyle = '#ff6666';
    ctx.fillText('暈眩中...', W / 2, pad + 38 * S);
  }
}

// ---------- 受擊閃爍 ----------
function drawScreenFlash() {
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,30,30,${screenFlash / 10 * 0.15})`;
    ctx.fillRect(0, 0, W, GAME_H);
  }
}

// ---------- 控制區 ----------
function drawControlZone() {
  // 漸層背景
  const g = ctx.createLinearGradient(0, H - CTRL_H - 25, 0, H);
  g.addColorStop(0,    'rgba(5,10,25,0)');
  g.addColorStop(0.12, 'rgba(5,10,25,0.65)');
  g.addColorStop(1,    'rgba(5,10,25,0.92)');
  ctx.fillStyle = g; ctx.fillRect(0, H - CTRL_H - 25, W, CTRL_H + 25);
  // 分隔線
  ctx.strokeStyle = 'rgba(80,130,220,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(20, H - CTRL_H); ctx.lineTo(W - 20, H - CTRL_H); ctx.stroke();

  drawJoystick();
  drawCastButton();
}

// ---------- 虛擬搖桿繪製 ----------
function drawJoystick() {
  const { cx, cy, r, kr, dx, dy, active } = joy;
  // 外環
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
  ctx.strokeStyle = active ? 'rgba(124,58,237,0.45)' : 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1.5; ctx.stroke();
  // 方向指示點
  for (const [ddx, ddy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    ctx.beginPath(); ctx.arc(cx + ddx * (r - 6), cy + ddy * (r - 6), 1.8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
  }
  // 把手
  const kx = cx + dx, ky = cy + dy;
  ctx.beginPath(); ctx.arc(kx, ky, kr, 0, Math.PI * 2);
  const kg = ctx.createRadialGradient(kx - 2, ky - 2, 0, kx, ky, kr);
  if (active) {
    kg.addColorStop(0, 'rgba(167,139,250,0.9)');
    kg.addColorStop(1, 'rgba(124,58,237,0.55)');
  } else {
    kg.addColorStop(0, 'rgba(180,180,210,0.35)');
    kg.addColorStop(1, 'rgba(130,130,165,0.15)');
  }
  ctx.fillStyle = kg; ctx.fill();
  // 把手光暈
  if (active) {
    ctx.shadowColor = 'rgba(124,58,237,0.4)'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(kx, ky, kr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(167,139,250,0.4)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // 標籤
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${9 * S}px system-ui,sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('移動', cx, Math.min(cy + r + 12, H - 8));
}

// ---------- 釣魚按鈕繪製 ----------
function drawCastButton() {
  const { cx, cy, r, pressed } = cast;
  const ready = !hook.active && !hook.reeling && stunTimer <= 0 && !gameOver;
  // 脈動光暈
  if (ready) {
    const pulse = Math.sin(frameCount * 0.07) * 0.12 + 0.14;
    ctx.beginPath(); ctx.arc(cx, cy, r + 8 + Math.sin(frameCount * 0.07) * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(244,63,94,${pulse})`; ctx.fill();
  }
  // 按鈕本體
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  const bg = ctx.createRadialGradient(cx - 4, cy - 4, 0, cx, cy, r);
  if (!ready) {
    bg.addColorStop(0, 'rgba(70,70,90,0.45)');
    bg.addColorStop(1, 'rgba(40,40,60,0.35)');
  } else if (pressed) {
    bg.addColorStop(0, 'rgba(255,110,130,0.95)');
    bg.addColorStop(1, 'rgba(210,35,65,0.85)');
  } else {
    bg.addColorStop(0, 'rgba(244,75,105,0.88)');
    bg.addColorStop(1, 'rgba(195,28,58,0.72)');
  }
  ctx.fillStyle = bg; ctx.fill();
  // 鉤子圖示
  const ic = ready ? '#fff' : '#666', is = r * 0.42;
  ctx.save(); ctx.translate(cx, cy - 1);
  ctx.strokeStyle = ic; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -is); ctx.lineTo(0, is * 0.15);
  ctx.arc(is * 0.3, is * 0.15, is * 0.3, Math.PI, -0.2, true);
  ctx.stroke();
  ctx.restore();
  // 標籤
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${10 * S}px system-ui,sans-serif`;
  ctx.fillStyle = ready ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.2)';
  ctx.fillText('釣!', cx, Math.min(cy + r + 12, H - 8));
}

// ---------- 圓角矩形 ----------
function rr(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ---------- Game Over ----------
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  const pw = Math.min(320 * S, W * 0.85), ph = 210 * S;
  const px = (W - pw) / 2, py = (GAME_H - ph) / 2;
  // 面板
  ctx.fillStyle = 'rgba(10,18,45,0.94)';
  rr(ctx, px, py, pw, ph, 14 * S); ctx.fill();
  ctx.strokeStyle = 'rgba(80,120,200,0.3)'; ctx.lineWidth = 1.5;
  rr(ctx, px, py, pw, ph, 14 * S); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // 悲傷貓咪（Canvas 精靈）
  drawSprite('sadcat', ctx, W / 2, py + 42 * S, 40 * S);
  // 標題
  ctx.font = `bold ${28 * S}px system-ui,sans-serif`;
  ctx.fillStyle = '#FF6B6B';
  ctx.fillText('Game Over', W / 2, py + 85 * S);
  // 分數
  ctx.font = `${18 * S}px system-ui,sans-serif`;
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`最終分數: ${score}`, W / 2, py + 118 * S);
  // 重新開始按鈕
  const bw = 170 * S, bh = 42 * S;
  const bx = (W - bw) / 2, by = py + 148 * S;
  ctx.fillStyle = '#4CAF50';
  rr(ctx, bx, by, bw, bh, 10 * S); ctx.fill();
  ctx.font = `bold ${16 * S}px system-ui,sans-serif`;
  ctx.fillStyle = '#fff';
  // 重新整理圖示 + 文字
  drawSprite('refresh', ctx, W / 2 - 42 * S, by + bh / 2, 16 * S);
  ctx.fillText('重新開始', W / 2 + 8 * S, by + bh / 2);
  restartBtn.x = bx; restartBtn.y = by; restartBtn.w = bw; restartBtn.h = bh;
}

// ==================== 重新開始 ====================
function restartGame() {
  score = 0; hunger = HUNGER_MAX; gameOver = false;
  stunTimer = 0; frameCount = 0; spawnCD = 50; screenFlash = 0;
  castRequested = false;
  items = []; particles = []; floats = []; bubbles = [];
  hook.active = false; hook.reeling = false; hook.caught = null;
  player.x = W / 2;
  recalcLayout();
  for (let i = 0; i < 4; i++) spawnItem();
}

// ==================== Playwright 測試掛鉤 ====================
// render_game_to_text: 回傳 JSON 遊戲狀態
// 座標系：原點左上角，X 向右、Y 向下
window.render_game_to_text = () => JSON.stringify({
  mode: gameOver ? 'gameover' : stunTimer > 0 ? 'stunned' : 'playing',
  score,
  hunger: Math.round(hunger * 10) / 10,
  player: { x: Math.round(player.x), y: Math.round(player.y) },
  hook: {
    active: hook.active, reeling: hook.reeling,
    x: Math.round(hook.x), y: Math.round(hook.y),
    caught: hook.caught ? { type: hook.caught.type, emoji: hook.caught.emoji } : null,
  },
  entities: items.map(it => ({
    type: it.type, emoji: it.emoji,
    x: Math.round(it.x), y: Math.round(it.y),
  })),
  stunTimer, frameCount,
  canvas: { w: W, h: H, seaY: Math.round(SEA_Y), ctrlH: Math.round(CTRL_H) },
});

// advanceTime: 確定性時間推進（供 Playwright 腳本呼叫）
window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (let i = 0; i < steps; i++) update();
  draw();
};

// ==================== 主迴圈 ====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ==================== 初始化 ====================
resize();
player.x = W / 2;
recalcLayout();
for (let i = 0; i < 5; i++) spawnItem();
gameLoop();
</script>
